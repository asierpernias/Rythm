<html lang="es">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <title>ONE KEY - My rythm game</title>
</head>
<body>
    <div id="contenedor">
        <div id="lineadejuego"></div>
        <div id="zonadisparo"></div>
        <div id="hud">
            <div id="vidas"></div>
            <div id="score">0</div>
        </div>
        <div id="combos"></div>
        <div id="judgement"></div>
        <div id="pista_tecla">ESPACIO</div>
        <div class="overlays" id="pantalla-inicio">
            <h1>ONE KEY</h1>
            <p>Presiona <b>ESPACIO</b> (o toca la pantalla) cuando el bloque cruce la linea azul</p>
            <button id="inicio">Jugar</button>
        </div>

        <div class="overlays" id="gameover-pantalla" style="display:none">
            <h1>Fin del juego</h1>
            <div class="ests" id="final-score">0</div>
            <p id="detalles">Puntuacion</p>
            <button id="restart">Reintentar</button>
        </div>
    </div>
    <script>
        const contenedor = document.getElementById('contenedor');
        const lane = document.getElementById('lineadejuego');
        const scoreEl = document.getElementById('score');
        const combosEl = document.getElementById('combos');
        const judgementEl = document.getElementById('judgement');
        const keyHint = document.getElementById('pista_tecla');
        const livesEl = document.getElementById('vidas');
        const startPantalla = document.getElementById('pantalla-inicio');
        const perdidaPantalla = document.getElementById('gameover-pantalla');

        const LANE_HEIGHT = contenedor.clientHeight;
        const HIT_Y = LANE_HEIGHT - 90;
        const TRAVEL_MS = 1400;
        const PERFECT_WINDOW = 45;
        const GOOD_WINDOW = 120;
        const SPEED = (HIT_Y + 22) / TRAVEL_MS;

        let audioCtx = null;

        function beep(freq, dur, volumen) {
            if(!audioCtx) return;
            const asbd = audioCtx.createOscillator();
            const gsh = audioCtx.createGain();
            asbd.frequency.value = freq;
            asbd.type = 'sine';
            gsh.gain.value = volumen;
            gsh.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            asbd.connect(gsh).connect(audioCtx.destination);
            asbd.start();
            asbd.stop(audioCtx.currentTime + dur);
        }

        let score = 0;
        let combo = 0;
        let lives = 3; 
        let running = false;
        let notes = [];
        let spawnTimer = null;
        let bpm = 100;
        let beatConta = 0;
        
        function initLives() {
            livesEl.innerHTML = '';
            for (let i = 0; i<3; i++) {
                const d = document.createElement('div');
                d.className = 'life';
                livesEl.appendChild(d);
            }
        }

        function looseLife() {
            lives--;
            const dots = livesEl.children;
            if (dots[lives]) dots[lives].classList.add('lost');
            if (lives <= 0) endGame();
        }

        function spawnNote() {
            beatConta++;
            const isHold = Math.random() < 0.3;
            const holdms = isHold ? 400 + Math.random() * 500 : 0;
            const height = 22 + holdms * SPEED;

            const el = document.createElement('div');
            el.className = isHold ? 'note hold' : 'note';
            el.style.height = height + 'px';
            el.style.top = -height + 'px';
            lane.appendChild(el);

            const targetTime = performance.now() + TRAVEL_MS;
            notes.push({el, targetTime, isHold, holdms, height,
                endTime: targetTime + holdms,
                judged: false,
                state: 'falling',
            });

            if (bpm < 170 && beatConta % 8 === 0) bpm += 4;
        }
         
        function scheduler() {
            if (!running) return;
            const base = 60000 / bpm;
            const jitter = base * 0.35;
            const delay = base + (Math.random() * 2 -1) * jitter;
            spawnTimer = setTimeout(() => {
                spawnNote();
                scheduler();
            }, Math.max(250, delay));
        }

        function showJudgement(text, color) {
            judgementEl.textContent = text;
            judgementEl.style.color = color;
            judgementEl.style.opacity = '1';
            judgementEl.style.transform = 'translateX(-50%) translateY(-6px)';
            clearTimeout(showJudgement._t);
            showJudgement._t = setTimeout(() => {
                judgementEl.style.opacity = '0';
                judgementEl.style.transform = 'translateX(-50%) translateY(0)';
            }, 220);
        }

        function flashCOmbo() {
            if (combo > 1) {
                combosEl.textContent = combo + 'combo';
                combosEl.style.opacity = '1';
                clearTimeout(flashCOmbo._t);
                flashCOmbo._t = setTimeout(() => {
                    combosEl.style.opacity = '0';
                }, 300);
            } else {
                combosEl.style.opacity = '0';
            }
        }

        function trypress() {
            keyHint.classList.add('pressed');
            if (!running) return;

            let closest = null, closestDiff = Infinity;
            for (const n of notes) {
                if (n.state !== 'falling') continue;
                const diff = Math.abs(performance.now() - n.targetTime);
                if (diff < closestDiff) { closestDiff = diff; closest = n; }
            }

            if (closest && closestDiff <= GOOD_WINDOW) {
                if (closest.isHold) {
                    closest.state = 'holding';
                    closest.el.classList.add('active');
                    const perfect = closestDiff <= PERFECT_WINDOW;
                    showJudgement(perfect ? 'PERFECT':'GOOD', perfect ? '#4a9eff' : '#ffd45d');
                    beep(perfect ? 880 : 660, 0.08, 0.12);
                } else {
                    closest.judged = true;
                    closest.state = 'done';
                    closest.el.remove();

                    if (closestDiff <= PERFECT_WINDOW) {
                        score += 100; combo++;
                        showJudgement('PERFECT', '#4a9eff');
                        beep(880, 0.08, 0.15);
                    } else {
                        score += 50; combo++;
                        showJudgement("GOOD", "#ff45d");
                        beep(660, 0.08, 0.12);
                    }
                    flashCOmbo();
                    scoreEl.textContent = score;
                }
            } else {
                combo = 0;
                showJudgement('FALLO', "#ff5d8f");
                flashCOmbo();
                beep(180, 0.15, 0.15);
            }
        }

        function attemtRelease() {
            keyHint.classList.remove('pressed');
            if (!running) return;

            const held = notes.find(n => n.state === "holding");
            if (!held) return;

            const diff = Math.abs(performance.now() - held.endTime);
            held.state = 'done';
            held.judged = true;
            held.el.remove();

            if (diff <= GOOD_WINDOW) {
                score += 150; combo++;
                showJudgement('PERFECT HOLD', "#4a9eff");
                beep(990, 0.1, 0.15);
            } else {
                combo = 0;
                showJudgement('SOLTASTE ANTES', '#ff5d8f');
                beep(180, 0.15, 0.15);
            }

            flashCOmbo();
            scoreEl.textContent = score;
        }

        function Loop() {
            if (!running) return;
            const now = performance.now();
            for (const n of notes) {
                if (n.state === 'done') continue;
                    if (n.state === 'falling') {    
                        const timeLeft = n.targetTime -now;
                        const progress = 1 - (timeLeft / TRAVEL_MS);
                        const y = progress * (HIT_Y + 22) - n.height;
                        n.el.style.top = y + 'px';

                        if (timeLeft < -GOOD_WINDOW) {
                            n.state = 'done';
                            n.judged = true;
                            n.el.remove();
                            combo = 0;
                            looseLife();
                            showJudgement('FALLO', '#ff5d8f');
                            flashCOmbo();
                        }
                    } else if (n.state === 'holding') {
                        n.el.style.top = (HIT_Y + 22 - n.height) + 'px';

                        if (now > n.endTime + GOOD_WINDOW) {
                            n.state = 'done';
                            n.judged = true;
                            n.el.remove();
                            score += 150; combo++;
                            showJudgement('PERFECT HOLD', "#4a9eff");
                            flashCOmbo();
                            scoreEl.textContent = score;
                        }
                    }
                }

             notes = notes.filter(n => !n.judged);
             requestAnimationFrame(Loop);
        }

        function startGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            score = 0; combo = 0; lives = 3; bpm = 100; beatConta = 0;
            notes.forEach(n => n.el.remove());
            notes = [];
            scoreEl.textContent = '0';
            initLives();
            startPantalla.style.display = 'none';
            perdidaPantalla.style.display = 'none';
            running = true;
            clearTimeout(spawnTimer);
            scheduler();
            requestAnimationFrame(Loop);
        }

        function endGame() {
            running = false;
            clearTimeout(spawnTimer);
            document.getElementById('final-score').textContent = score;
            document.getElementById('detalles').textContent = 'Puntuación final';
            perdidaPantalla.style.display = 'flex';
        }

        document.getElementById('inicio').addEventListener('click', startGame);
        document.getElementById('restart').addEventListener('click', startGame);

        window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !e.repeat) {
            e.preventDefault();
            trypress();
        }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                attemtRelease();
            }
        })
        contenedor.addEventListener('touchstart', (e) => { e.preventDefault(); trypress(); }, { passive: false });
        contenedor.addEventListener('touchend', (e) => {e.preventDefault(); attemtRelease(); }, {passive:false});
        contenedor.addEventListener('mousedown', trypress);
        contenedor.addEventListener('mouseup', attemtRelease);

    </script>
</body>
</html>
